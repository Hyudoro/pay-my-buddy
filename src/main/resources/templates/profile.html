<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Profile</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body>
  <div class="container">
   <div th:replace="~{fragments/navbar :: navbar}"></div>
   <form th:action="@{/profile}" method="post">

     <div class="profile-row">
       <span class="profile-label">Username</span>
       <details class="profile-value">
         <summary th:text="${profile.username}"></summary>
         <input  type="text" name="username" placeholder="New username"/>
       </details>
     </div>

     <div class="profile-row">
       <span class="profile-label">Mail</span>
       <details class="profile-value">
         <summary th:text="${profile.email}"></summary>
         <input  type="text" name="email" placeholder="New e-mail"/>
       </details>
     </div>

     <div class="profile-row">
       <span class="profile-label">Password</span>
       <details class="profile-value">
         <summary> password </summary>
         <input type="password" name="oldPassword" placeholder="Old password">
         <input type="password" name="newPassword" placeholder="New password">
       </details>
     </div>
     <button type="submit" class="btn-orange">Modify</button>

   </form>
   <p th:if="${error}" th:text="${error}" class="error-msg"></p>
 </div>
</body>
</html>
