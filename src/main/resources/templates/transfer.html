<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Transfer</title>
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <p th:if="${error}" th:text="${error}"></p>

    <form th:action="@{/transfer}" method="post">

        <select name="receiverId">
            <option th:each="connection : ${connections}"
                    th:value="${connection.id}"
                    th:text="${connection.username}">
            </option>
        </select>

        <input type="number" name="amount" step="0.01" placeholder="Amount"/>
        <input type="text" name="description" placeholder="Description"/>

        <button type="submit">Send</button>

    </form>

    <table>
      <thead>
            <tr>
                <th>Receiver</th>
                <th>Description</th>
                <th>Amount</th>
            </tr>
      </thead>
        <tbody>

           <tr th:each="transaction : ${transactions}">
                <td th:text="${transaction.receiverUsername}"></td>
                <td th:text="${transaction.description}"></td>
                <td th:text="${transaction.amount}"></td>
           </tr>

        </tbody>
    </table>
</body>
</html>
